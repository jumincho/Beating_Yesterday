name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  structure-and-secrets:
    name: Structure & Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE app/build.gradle build.gradle settings.gradle gradle.properties gradlew gradlew.bat; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: No committed API keys (Food Safety OpenAPI uses base64-like service keys)
        run: |
          if grep -rEn 'FOOD_API_KEY[[:space:]]*=[[:space:]]*"[A-Za-z0-9+/=]{20,}"' app/src/ 2>/dev/null; then
            echo "::error::Hardcoded Food Safety API key in source"
            exit 1
          fi

      - name: .gitignore covers known secret paths
        run: |
          if ! grep -Fq "local.properties" .gitignore; then
            echo "::error::local.properties must be in .gitignore"
            exit 1
          fi

  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
    steps:
      - uses: actions/checkout@v4

      # AGP 7.2.x targets JDK 11.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      # Install the Android SDK by hand rather than via a third-party action,
      # so the workflow stays within an "actions created by GitHub only" policy.
      # cmdline-tools 9477386 is the last line that runs on JDK 11.
      - name: Install Android SDK
        run: |
          set -eux
          tools="$ANDROID_SDK_ROOT/cmdline-tools"
          mkdir -p "$tools"
          curl -fsSL -o /tmp/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d "$tools"
          mv "$tools/cmdline-tools" "$tools/latest"
          yes | "$tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$tools/latest/bin/sdkmanager" \
            "platform-tools" "platforms;android-32" "build-tools;32.0.0"

      # assembleDebug compiles and packages the app; testDebugUnitTest runs the
      # JVM unit tests (e.g. HealthMetricsTest). A throwaway key satisfies the
      # build-time FOOD_API_KEY guard — it never reaches a real request in CI.
      - name: Assemble & unit test
        env:
          FOOD_API_KEY: ci-build-placeholder-key
        run: ./gradlew --no-daemon --stacktrace assembleDebug testDebugUnitTest
