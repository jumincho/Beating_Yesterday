name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  structure-and-secrets:
    name: Structure & Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE app/build.gradle build.gradle settings.gradle gradle.properties gradlew gradlew.bat; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: No committed API keys (Food Safety OpenAPI uses base64-like service keys)
        run: |
          if grep -rEn 'FOOD_API_KEY[[:space:]]*=[[:space:]]*"[A-Za-z0-9+/=]{20,}"' app/src/ 2>/dev/null; then
            echo "::error::Hardcoded Food Safety API key in source"
            exit 1
          fi

      - name: .gitignore covers known secret paths
        run: |
          if ! grep -Fq "local.properties" .gitignore; then
            echo "::error::local.properties must be in .gitignore"
            exit 1
          fi

  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # AGP 7.2.x targets JDK 11.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # assembleDebug compiles and packages the app; testDebugUnitTest runs the
      # JVM unit tests (e.g. HealthMetricsTest). A throwaway key satisfies the
      # build-time FOOD_API_KEY guard — it never reaches a real request in CI.
      - name: Assemble & unit test
        env:
          FOOD_API_KEY: ci-build-placeholder-key
        run: ./gradlew --no-daemon --stacktrace assembleDebug testDebugUnitTest
